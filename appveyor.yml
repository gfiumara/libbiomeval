version: 1.0.{build}

image:
  - Visual Studio 2017

configuration:
 - Release

platform:
  - x64
  - Win32

install:
- cmd: git submodule update --init
- cmd: cd C:\Tools\vcpkg
- cmd: git pull
- cmd: .\bootstrap-vcpkg.bat
- cmd: cd %APPVEYOR_BUILD_FOLDER%
  for:
    -
      matrix:
        only:
        - platform: Win32
          install:
            - cmd: vcpkg install berkeleydb hwloc libjpeg-turbo libpng openjpeg openssl sqlite3 tiff zlib --triplet x86-windows
            - cmd: vcpkg install berkeleydb hwloc libjpeg-turbo libpng openjpeg openssl sqlite3 tiff zlib --triplet x86-windows-static
        - plaform: x64
          install:
            - cmd: vcpkg install berkeleydb hwloc libjpeg-turbo libpng openjpeg openssl sqlite3 tiff zlib --triplet x64-windows
            - cmd: vcpkg install berkeleydb hwloc libjpeg-turbo libpng openjpeg openssl sqlite3 tiff zlib --triplet x64-windows-static

cache: c:\tools\vcpkg\installed\

before_build:
- cmd: >-
    md C:\projects\libbiomeval\install
    cd C:\projects\libbiomeval
    md build\Windows
    cd build\Windows
    cmake -A %PLATFORM% -DCMAKE_CONFIGURATION_TYPES=%CONFIGURATION% -DCMAKE_INSTALL_PREFIX=C:\projects\libbiomeval\install C:\projects\libbiomeval

build:
  project: C:\projects\nfiq2\build\Windows\biomeval.sln
  verbosity: normal
  parallel: true
